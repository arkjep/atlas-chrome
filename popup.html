<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ATLAS</title>
    <link rel="stylesheet" href="src/popup.css">
  </head>
  <body>
    <main>
      <button id="client-button" class="client-button" type="button" title="Cycle client">
        <span id="client-icon" class="client-icon">
          <img alt="" src="assets/logo.png">
        </span>
        <span id="client-name" class="sr-only">Loading clients</span>
      </button>
      <button id="zap-button" class="zap-button" type="button" title="Create task" aria-label="Create task">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <g class="zap-icon">
            <path class="zap-core" d="M13.9 2.4 5.7 13h5.2l-.8 8.6 8.2-11.2h-5.5l1.1-8Z"/>
            <path class="zap-trace" d="M13.1 4.7 10.3 8.4v2.1H8.5M12.7 10.5h2.4l-2.8 3.7v2.9"/>
            <circle class="zap-node" cx="10.3" cy="8.4" r=".72"/>
            <circle class="zap-node" cx="12.7" cy="10.5" r=".72"/>
            <circle class="zap-node" cx="12.3" cy="17.1" r=".72"/>
          </g>
          <g class="success-icon">
            <path class="success-ring" d="M20.2 12a8.2 8.2 0 1 1-2.8-6.2"/>
            <path class="success-check" d="m7.4 12.1 3 3.1 6.8-7.5"/>
          </g>
        </svg>
      </button>
      <p id="status" role="status"></p>
    </main>
    <script src="src/popup.js"></script>
  </body>
</html>
